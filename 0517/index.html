<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Couple Widget — Frontend Preview</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- Settings / quick connect -->
  <div id="settings" class="settings">
    <h4>Widget (Preview)</h4>
    <label>Supabase URL
      <input id="supabaseUrl" placeholder="https://xyz.supabase.co" />
    </label>
    <label>Supabase ANON KEY
      <input id="supabaseKey" placeholder="public-anon-key" />
    </label>
    <label>Partner code
      <input id="partnerCode" placeholder="partner-connection-code" />
    </label>
    <div class="settings-row">
      <button id="connectBtn">Connect</button>
      <button id="simulateBtn">Simulate incoming pet</button>
    </div>
    <div id="status" class="status">Status: disconnected (using local fallback)</div>
    <small class="hint">This UI is safe to run in the browser. No Tauri/Rust required here.</small>
  </div>

  <!-- The widget overlay in bottom-right -->
  <div id="widget" class="widget" aria-hidden="false">
    <div id="hearts" class="hearts" aria-hidden="true"></div>
    <div id="character" class="character" role="button" tabindex="0" title="Click to pet">
      <!-- Simple emoji character. Replace with an image if you prefer. -->
      <span class="char-emoji">🐻</span>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
